services:
  docling-serve:
    image: ${DOCLING_IMAGE}
    container_name: docling-serve
    ports:
      - "${DOCLING_PORT}:5001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DOCLING_SERVE_ENABLE_UI: "true"
      DOCLING_SERVE_ENABLE_MANAGEMENT_ENDPOINTS: "true"
      DOCLING_SERVE_LOAD_MODELS_AT_BOOT: ${DOCLING_LOAD_MODELS_AT_BOOT}
      DOCLING_SERVE_LOG_LEVEL: INFO
      DOCLING_SERVE_ENABLE_REMOTE_SERVICES: ${DOCLING_ENABLE_REMOTE_SERVICES}
      DOCLING_SERVE_ALLOW_CUSTOM_VLM_CONFIG: ${DOCLING_ALLOW_CUSTOM_VLM_CONFIG}
      DOCLING_SERVE_ALLOW_CUSTOM_PICTURE_DESCRIPTION_CONFIG: ${DOCLING_ALLOW_CUSTOM_PICTURE_DESCRIPTION_CONFIG}
      DOCLING_DEVICE: cuda
      DOCLING_SERVE_DEFAULT_VLM_PRESET: ${DOCLING_VLM_PRESET}
      NVIDIA_VISIBLE_DEVICES: all
    runtime: nvidia
    restart: unless-stopped
