services:
  docling-serve:
    image: ${DOCLING_IMAGE}
    container_name: docling-serve
    ports:
      - "${DOCLING_PORT}:5001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DOCLING_SERVE_ENABLE_UI: "true"
      DOCLING_SERVE_ENABLE_MANAGEMENT_ENDPOINTS: "true"
      DOCLING_SERVE_LOAD_MODELS_AT_BOOT: ${DOCLING_LOAD_MODELS_AT_BOOT}
      DOCLING_SERVE_LOG_LEVEL: INFO
      DOCLING_SERVE_ENABLE_REMOTE_SERVICES: ${DOCLING_ENABLE_REMOTE_SERVICES}
      DOCLING_SERVE_ALLOW_CUSTOM_VLM_CONFIG: ${DOCLING_ALLOW_CUSTOM_VLM_CONFIG}
      DOCLING_SERVE_ALLOW_CUSTOM_PICTURE_DESCRIPTION_CONFIG: ${DOCLING_ALLOW_CUSTOM_PICTURE_DESCRIPTION_CONFIG}
      DOCLING_DEVICE: cuda
      DOCLING_SERVE_DEFAULT_VLM_PRESET: ${DOCLING_VLM_PRESET}
      NVIDIA_VISIBLE_DEVICES: all
    runtime: nvidia
    restart: unless-stopped

  vllm-openai:
    profiles:
      - vllm
    image: ${VLLM_IMAGE}
    container_name: vllm-openai
    ports:
      - "${VLLM_PORT}:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN}
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - vllm-cache:/root/.cache/huggingface
    ipc: host
    runtime: nvidia
    command:
      - --model
      - ${VLLM_MODEL}
      - --served-model-name
      - ${VLLM_SERVED_MODEL_NAME}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN}
      - --limit-mm-per-prompt.image
      - "1"
    restart: unless-stopped

volumes:
  vllm-cache:
